<!DOCTYPE html>
<html>
<head>
    <title>Detection History - Smart Surveillance</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Navbar -->
<div class="navbar">
    <h1>Smart Surveillance System</h1>
    <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="live.html">Live</a></li>
        <li><a href="history.html">History</a></li>
        <li><a href="alerts.html">Alerts</a></li>
    </ul>
</div>

<!-- Container -->
<div class="container">

    <h2>Detection History</h2>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Object</th>
                    <th>Confidence</th>
                    <th>Time</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="history-body">
                <!-- Data will load here automatically -->
            </tbody>

        </table>
    </div>

</div>

<script>
async function loadDetections() {
    try {
        const response = await fetch("http://127.0.0.1:5000/detections");
        const data = await response.json();

        const tableBody = document.getElementById("history-body");
        tableBody.innerHTML = "";

        data.slice().reverse().forEach(item => {

            // Define dangerous objects
            const dangerousObjects = ["knife", "scissors", "gun", "cell phone"];

            let statusText = "SAFE";
            let statusClass = "status-safe";

            if (dangerousObjects.includes(item.object)) {
                statusText = "ALERT";
                statusClass = "status-alert";
            }

            const row = `
                <tr>
                    <td>${item.object}</td>
                    <td>${item.confidence}</td>
                    <td>${item.time}</td>
                    <td class="${statusClass}">${statusText}</td>
                </tr>
            `;

            tableBody.innerHTML += row;
        });

    } catch (error) {
        console.error("Error fetching detections:", error);
    }
}

// Refresh every 2 seconds
setInterval(loadDetections, 2000);

// Load immediately
loadDetections();
</script>

</body>
</html>
